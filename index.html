<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Tarefas - PEAS Architecture</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>📋 Gerenciador de Tarefas</h1>
        <p>Organize suas atividades diárias com facilidade</p>
    </header>

    <main>
        <!-- Sensores: Formulário de Captura de Dados -->
        <section class="form-section">
            <form id="task-form">
                <div class="input-group">
                    <label id="label-nova-tarefa" for="task-input">Nova Tarefa:</label>
                    <input 
                        type="text" 
                        id="task-input" 
                        aria-labelledby="label-nova-tarefa"
                        placeholder="Digite a descrição da tarefa..." 
                        required
                    >
                </div>
                <button type="submit" id="btn-add">Adicionar</button>
            </form>
        </section>

        <!-- Atuadores / Performance: Exibição Dinâmica -->
        <section class="list-section">
            <h2>Suas Tarefas</h2>
            <div id="loading-feedback" class="feedback-msg hidden">Carregando tarefas...</div>
            <ul id="task-list">
                <!-- As tarefas dinâmicas via JS entrarão aqui -->
            </ul>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 - Sistema Web TaskWeb. Modelagem baseada no Pilar PEAS.</p>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
